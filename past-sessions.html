<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Koi Pond — Past Sessions</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/koi.css">
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
      colors: {
        koi:  { 50:'#FFF4ED',100:'#FFDCC7',400:'#FF8F4A',500:'#FF6B1E',600:'#E55510',700:'#B53D08' },
        pond: { 50:'#F5F5F2',100:'#E8E8E2',300:'#A3A39A',500:'#525248',700:'#1A1A14',900:'#0A0A06' },
        lily: { 50:'#FFF8F2',100:'#FFE0CC',300:'#FFC4A0',400:'#FFA875',500:'#F08858',600:'#C76A40',700:'#9F522F' },
        cream:{ 50:'#FDFCF5',100:'#FAF7EE',200:'#EFEAD9' }
      }
    } }
  }
</script>
<style>
  body { font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; background-color: #FAF7EE; position: relative; } body::before { content:""; position: fixed; inset:0; z-index:-1; pointer-events:none; background-image: linear-gradient(180deg, #C9DCEF 0%, #D6E4F2 22%, #E5ECF3 50%, #F0EEE5 78%, #FAF7EE 100%); }
  .card-shadow { box-shadow: 0 1px 2px rgba(0,0,0,.03), 0 8px 30px -10px rgba(10,10,6,.08); }
  .nav-link { display:flex; align-items:center; gap:.625rem; padding:.5rem .75rem; border-radius:.625rem; font-size:13.5px; font-weight:500; color:rgba(255,255,255,.7); transition:all .15s; }
  .nav-link:hover { color:#fff; background:rgba(255,255,255,.08); }
  .nav-link.active { background:#FF6B1E; color:#fff; }
  .chip { display:inline-flex; align-items:center; padding:.35rem .75rem; border-radius:999px; font-size:12px; font-weight:500; border:1px solid #E8E8E2; background:#fff; color:#1A1A14; cursor:pointer; transition:all .15s; }
  .chip.active { background:#0A0A06; color:#fff; border-color:#0A0A06; }
</style>
<script type="module" src="./lib/auth-gate.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="text-pond-900">

<div class="flex min-h-screen">

  <aside class="hidden md:flex w-60 shrink-0 bg-[#0A0A06]/95 backdrop-blur-md border-r border-white/10 flex-col sticky top-0 h-screen z-30">
    <a href="./index.html" class="px-5 pt-6 pb-5 flex items-center gap-2">
      <img src="./assets/koi-pond-logo.svg" alt="Koi Pond" class="logo logo-dark logo-lg w-auto"/>
    </a>
    <nav class="flex-1 px-3 py-2 space-y-0.5">
      <a href="./dashboard.html" class="nav-link"><i data-lucide="layout-dashboard" class="w-4 h-4"></i>Dashboard</a>
      <a href="./practice.html" class="nav-link"><i data-lucide="play" class="w-4 h-4"></i>Practice</a>
      <a href="./past-sessions.html" class="nav-link active"><i data-lucide="clock" class="w-4 h-4"></i>Past Sessions</a>
      <a href="./progress.html" class="nav-link"><i data-lucide="trending-up" class="w-4 h-4"></i>Progress</a>
      <a href="./leaderboard.html" class="nav-link"><i data-lucide="trophy" class="w-4 h-4"></i>Leaderboard</a>
      <a href="./account.html" class="nav-link"><i data-lucide="user" class="w-4 h-4"></i>Account</a>
    </nav>
    <div class="p-3 border-t border-white/10 space-y-1">
      <a href="./account.html" class="flex items-center gap-2.5 px-2 py-2 rounded-lg hover:bg-white/10 transition">
        <span data-user-avatar class="kp-avatar">U</span>
        <div class="flex-1 min-w-0">
          <p data-user-name class="text-[13px] font-semibold truncate text-white">…</p>
          <p data-user-meta class="text-[11px] text-white/50 truncate">…</p>
        </div>
      </a>
      <button data-signout class="w-full text-left px-2 py-1.5 rounded-lg text-[12px] text-white/65 hover:text-white hover:bg-white/10 transition inline-flex items-center gap-2">
        <i data-lucide="log-out" class="w-3.5 h-3.5"></i>
        Sign out
      </button>
    </div>
  </aside>

  <main class="flex-1 min-w-0">
    <div class="md:hidden flex items-center justify-between px-5 py-4 border-b border-white/10 bg-[#0A0A06]/95 backdrop-blur sticky top-0 z-20 text-white">
      <a href="./dashboard.html" class="flex items-center gap-2">
        <img src="./assets/koi-pond-logo.svg" alt="Koi Pond" class="logo logo-dark logo-md w-auto"/>
      </a>
      <span data-user-avatar class="kp-avatar">U</span>
    </div>

    <div class="max-w-5xl mx-auto px-5 sm:px-8 py-8 sm:py-10">
      <!-- Back / forward nav -->
      <nav class="flex items-center gap-1 mb-6">
        <button onclick="history.back()" type="button" aria-label="Back"
                class="w-8 h-8 rounded-full bg-[#0A0A06]/5 hover:bg-[#0A0A06]/10 text-pond-700 hover:text-pond-900 ring-1 ring-pond-100/40 flex items-center justify-center transition">
          <i data-lucide="chevron-left" class="w-4 h-4"></i>
        </button>
        <button onclick="history.forward()" type="button" aria-label="Forward"
                class="w-8 h-8 rounded-full bg-[#0A0A06]/5 hover:bg-[#0A0A06]/10 text-pond-700 hover:text-pond-900 ring-1 ring-pond-100/40 flex items-center justify-center transition">
          <i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>
      </nav>


      <header class="mb-6">
        <p class="text-[12px] text-pond-700/60 mb-1">Past Sessions</p>
        <h1 class="text-[28px] md:text-[32px] font-extrabold tracking-tight">Your practice history.</h1>
        <p id="ps-summary" class="mt-1.5 text-[14px] text-pond-700/80">Loading…</p>
      </header>

      <div id="ps-filters" class="hidden flex flex-wrap items-center gap-2 mb-6" data-filter-group="sort">
        <span class="text-[11px] uppercase tracking-wider font-bold text-pond-700/60 mr-1">Sort</span>
        <button class="chip active" data-sort="recent">Recent</button>
        <button class="chip" data-sort="high">Highest score</button>
        <button class="chip" data-sort="low">Lowest score</button>
        <button class="chip" data-sort="scenario">Scenario</button>
      </div>

      <div id="session-list" class="space-y-3"></div>

      <div id="ps-empty" class="hidden bg-white rounded-2xl border border-pond-100/60 p-8 text-center">
        <p class="text-[14px] font-semibold text-pond-900">No sessions yet.</p>
        <p class="mt-1 text-[12.5px] text-pond-700/65 max-w-sm mx-auto">Run your first pitch and The Shark will start grading. Every session you complete shows up here with its full report.</p>
        <a href="./practice.html" class="inline-flex items-center gap-1.5 mt-5 bg-koi-500 hover:bg-koi-600 text-pond-900 text-[13px] font-semibold px-4 py-2 rounded-full transition">
          Start your first pitch <i data-lucide="arrow-right" class="w-3 h-3"></i>
        </a>
      </div>

    </div>
  </main>
</div>

<script type="module">
  import { listSessions } from './lib/supabase.js';

  function fmtTime(sec) {
    if (sec == null) return '—';
    const m = Math.floor(sec / 60);
    const s = String(sec % 60).padStart(2, '0');
    return `${m}:${s}`;
  }
  function relTime(ts) {
    const d = new Date(ts);
    const mins = Math.round((Date.now() - d.getTime()) / 60000);
    if (mins < 60)   return `${Math.max(1,mins)} min ago`;
    const hrs = Math.round(mins / 60);
    if (hrs < 24)    return `${hrs} hr${hrs > 1 ? 's' : ''} ago`;
    const days = Math.round(hrs / 24);
    if (days < 7)    return `${days} day${days > 1 ? 's' : ''} ago`;
    const wks = Math.round(days / 7);
    if (wks < 5)     return `${wks} week${wks > 1 ? 's' : ''} ago`;
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }
  function initials(title) {
    const t = (title || '').trim();
    if (!t) return 'K';
    const parts = t.split(/\s+/).filter(Boolean).slice(0, 2);
    return parts.map(p => p[0]).join('').toUpperCase() || 'K';
  }

  const $list    = document.getElementById('session-list');
  const $summary = document.getElementById('ps-summary');
  const $filters = document.getElementById('ps-filters');
  const $empty   = document.getElementById('ps-empty');

  let sessions = [];

  const sorters = {
    recent:   (a,b) => new Date(b.created_at) - new Date(a.created_at),
    high:     (a,b) => (b.total_score ?? -1) - (a.total_score ?? -1),
    low:      (a,b) => (a.total_score ?? 1e9) - (b.total_score ?? 1e9),
    scenario: (a,b) => (a.scenario_title || '').localeCompare(b.scenario_title || '')
  };

  function render() {
    const sort = document.querySelector('[data-sort].active')?.dataset.sort || 'recent';
    const ordered = [...sessions].sort(sorters[sort]);
    $list.innerHTML = ordered.map(s => `
      <div class="bg-white rounded-2xl card-shadow p-4 flex flex-wrap items-center gap-4">
        <div class="w-11 h-11 rounded-full bg-gradient-to-br from-koi-200 to-koi-50 ring-1 ring-koi-100 flex items-center justify-center text-koi-700 font-bold text-sm shrink-0">${initials(s.scenario_title)}</div>
        <div class="flex-1 min-w-0">
          <p class="text-[14px] font-semibold truncate">${(s.scenario_title || 'Untitled session')}</p>
          <p class="text-[11px] text-pond-700/60 mt-0.5">${relTime(s.created_at)} · ${fmtTime(s.duration_sec)}${s.weak_area ? ' · weak area: ' + s.weak_area : ''}</p>
        </div>
        <div class="hidden sm:grid grid-cols-3 gap-3 text-center text-[11px]">
          <div><p class="text-pond-700/60">Overall</p><p class="text-[16px] font-extrabold">${s.total_score ?? '—'}</p></div>
          <div><p class="text-pond-700/60">Pitch</p><p class="text-[16px] font-extrabold">${s.pitch_score ?? '—'}</p></div>
          <div><p class="text-pond-700/60">Q&amp;A</p><p class="text-[16px] font-extrabold">${s.qa_score ?? '—'}</p></div>
        </div>
        <div class="flex gap-2 shrink-0">
          <button type="button" disabled title="Per-session detail page is coming next" class="text-[12px] font-semibold bg-cream-100 text-pond-700/50 cursor-not-allowed inline-flex items-center gap-1 px-3 py-2 rounded-full" data-session-id="${s.id}">
            Detail · soon
          </button>
        </div>
      </div>
    `).join('');
    if (window.lucide) lucide.createIcons();
  }

  try {
    sessions = await listSessions({ limit: 100 });
    if (!sessions || sessions.length === 0) {
      $summary.textContent = 'No sessions yet — your history will live here.';
      $empty.classList.remove('hidden');
    } else {
      const totalSecs = sessions.reduce((acc, s) => acc + (s.duration_sec || 0), 0);
      const hrs = (totalSecs / 3600).toFixed(1);
      const avg = Math.round(sessions.filter(s => s.total_score != null).reduce((a,s) => a + s.total_score, 0) / Math.max(1, sessions.filter(s => s.total_score != null).length));
      $summary.textContent = `${sessions.length} session${sessions.length > 1 ? 's' : ''} · ${hrs} hour${hrs === '1.0' ? '' : 's'} coached${isFinite(avg) ? ' · avg score ' + avg : ''}.`;
      $filters.classList.remove('hidden');
      $filters.classList.add('flex');
      render();
    }
  } catch (err) {
    console.error('[past-sessions] load failed:', err);
    $summary.textContent = 'Could not load sessions — please refresh.';
    $empty.classList.remove('hidden');
  }

  document.querySelectorAll('[data-filter-group="sort"] button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('[data-filter-group="sort"] button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      render();
    });
  });
</script>

<script>if(window.lucide)lucide.createIcons();</script>
</body>
</html>
